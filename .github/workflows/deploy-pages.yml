name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build web client
        # BASE_PATH is derived from the actual repo name so this keeps
        # working no matter what the repo gets renamed to
        # (https://<user>.github.io/<repo-name>/).
        # PORT is only required by the shared vite config, it is unused during build.
        # VITE_API_URL should point at wherever artifacts/api-server is hosted
        # (set it as a repo variable: Settings -> Secrets and variables -> Actions -> Variables).
        run: |
          PORT=4173 BASE_PATH="/${{ github.event.repository.name }}/" VITE_API_URL="${{ vars.VITE_API_URL }}" pnpm --filter @workspace/devdex run build

      - name: Add SPA fallback and disable Jekyll
        run: |
          cp artifacts/devdex/dist/public/index.html artifacts/devdex/dist/public/404.html
          touch artifacts/devdex/dist/public/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/devdex/dist/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
